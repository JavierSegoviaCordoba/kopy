name: build-kotlin

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  build:
    uses: JavierSegoviaCordoba/reusable-workflows/.github/workflows/build-kotlin.yaml@4fed19bced81f4d1690fab4679e6453c774b0909 # main
    with:
      allow-github-actor-bots: false
      deploy-docs: false
      publish-snapshot: true
      run_before_args: './gradlew assemble publishToMavenLocalTest'
    secrets: inherit
