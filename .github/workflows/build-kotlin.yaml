name: build-kotlin

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  build:
    uses: JavierSegoviaCordoba/reusable-workflows/.github/workflows/build-kotlin.yaml@22c3dce85094790803f899aa8a405b3c186e26b9 # main
    with:
      allow-github-actor-bots: false
      deploy-docs: false
      publish-snapshot: true
      run_before_args: './gradlew assemble publishToMavenLocalTest'
    secrets: inherit
