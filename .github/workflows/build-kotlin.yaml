name: build-kotlin

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

  pull_request:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  build:
    uses: JavierSegoviaCordoba/reusable-workflows/.github/workflows/build-kotlin.yaml@4ec55f3e2975433787c8973b5792a7f6a94a5bcf # main
    with:
      allow-github-actor-bots: false
      deploy-docs: false
      publish-snapshot: true
      run_before_args: './gradlew assemble publishToMavenLocalTest'
    secrets: inherit
